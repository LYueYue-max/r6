<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⏳ 扫雷游戏</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    body {
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
      min-height: 100vh;
      margin: 0;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .game-container {
      width: 100%;
      max-width: 500px;
      background: rgba(74, 85, 104, 0.95);
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
      overflow: hidden;
      padding: 16px;
    }
    h1 {
      text-align: center;
      margin: 0 0 16px 0;
      font-size: 1.6rem;
      font-weight: 600;
      color: #f7fafc;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .config-panel {
      background: rgba(45, 55, 72, 0.9);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .config-group {
      margin-bottom: 16px;
    }
    .config-group:last-child {
      margin-bottom: 0;
    }
    .config-title {
      color: #cbd5e0;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .config-title i {
      font-size: 1.1rem;
    }
    .input-field {
      width: 100%;
      background: #2d3748;
      border: 2px solid #4a5568;
      border-radius: 8px;
      padding: 10px 12px;
      color: white;
      font-size: 0.9rem;
      font-family: 'Courier New', monospace;
    }
    .input-field:focus {
      outline: none;
      border-color: #4fd1c7;
    }
    .input-hint {
      color: #a0aec0;
      font-size: 0.8rem;
      margin-top: 4px;
      margin-left: 4px;
    }
    .btn {
      background: #4fd1c7;
      border: none;
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1a202c;
      box-shadow: 0 4px 0 #2c7a7b;
      transition: all 0.1s ease;
      cursor: pointer;
      text-align: center;
      line-height: 1.2;
    }
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2c7a7b;
    }
    .btn.active {
      background: #38a169;
      box-shadow: 0 4px 0 #276749;
    }
    .btn.secondary {
      background: #90cdf4;
      box-shadow: 0 4px 0 #4299e1;
    }
    .btn.danger {
      background: #fc8181;
      box-shadow: 0 4px 0 #c53030;
    }
    .time-input-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(26, 32, 44, 0.5);
      border-radius: 12px;
      padding: 8px 12px;
    }
    .time-input {
      flex: 1;
      background: #2d3748;
      border: 2px solid #4a5568;
      border-radius: 8px;
      padding: 8px 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
    }
    .time-input:focus {
      outline: none;
      border-color: #4fd1c7;
    }
    .time-unit {
      color: #cbd5e0;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .mines-input-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(26, 32, 44, 0.5);
      border-radius: 12px;
      padding: 8px 12px;
    }
    .mines-input {
      flex: 1;
      background: #2d3748;
      border: 2px solid #4a5568;
      border-radius: 8px;
      padding: 8px 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
    }
    .mines-input:focus {
      outline: none;
      border-color: #4fd1c7;
    }
    .mines-value-display {
      color: #cbd5e0;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .mines-slider {
      width: 100%;
      -webkit-appearance: none;
      height: 8px;
      background: #2d3748;
      border-radius: 4px;
      outline: none;
      margin-top: 8px;
    }
    .mines-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #4fd1c7;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #2c7a7b;
    }
    .mines-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: #4fd1c7;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #2c7a7b;
    }
    .game-panel {
      display: none;
      background: rgba(45, 55, 72, 0.9);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(26, 32, 44, 0.8);
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 16px;
    }
    .timer, .mine-counter {
      background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
      padding: 6px 12px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: #68d391;
      letter-spacing: 1px;
      min-width: 70px;
      text-align: center;
    }
    .status-msg {
      color: #cbd5e0;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      flex: 1;
      margin: 0 12px;
    }
    .board {
      display: grid;
      gap: 2px;
      background: #4a5568;
      padding: 8px;
      border-radius: 12px;
      border: 2px solid #2d3748;
      margin-bottom: 16px;
    }
    .cell {
      aspect-ratio: 1;
      background: #718096;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: #1a202c;
      cursor: pointer;
      transition: all 0.1s ease;
    }
    .cell.covered {
      background: #90cdf4;
      box-shadow: inset 0 -2px 0 #4299e1;
    }
    .cell.covered:active {
      background: #63b3ed;
      transform: scale(0.95);
    }
    .cell.revealed {
      background: #cbd5e0;
    }
    .cell.flagged::before {
      content: "🚩";
      font-size: 0.8rem;
    }
    .cell.revealed.mine {
      background: #fc8181;
    }
    .cell.revealed.mine::before {
      content: "💣";
    }
    .num1 { color: #2b6cb0; }
    .num2 { color: #276749; }
    .num3 { color: #c53030; }
    .num4 { color: #553c9a; }
    .num5 { color: #9b2c2c; }
    .num6 { color: #2c7a7b; }
    .num7 { color: #1a202c; }
    .num8 { color: #744210; }
    .control-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .error-msg {
      color: #fc8181;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 8px;
      min-height: 20px;
    }
    .success-msg {
      color: #68d391;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 8px;
      min-height: 20px;
    }
    .footer {
      text-align: center;
      color: #a0aec0;
      font-size: 0.8rem;
      margin-top: 12px;
    }
    @media (max-width: 380px) {
      .game-container {
        padding: 12px;
      }
      .btn {
        padding: 8px 6px;
        font-size: 0.85rem;
      }
      .time-input, .mines-input {
        padding: 6px 8px;
        font-size: 0.9rem;
      }
      .timer, .mine-counter {
        font-size: 1rem;
        min-width: 60px;
        padding: 4px 8px;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>💣 扫雷游戏</h1>
  
  <!-- 第1步：连接设备面板 -->
  <div class="config-panel" id="panelConnect">
    <div class="config-group">
      <div class="config-title">🔌 步骤1：连接设备</div>
      <input type="text" id="connectionCode" class="input-field" 
             placeholder="请输入连接码，例如: 100000 dv2TVEUe0e434a00000c3d516c000000f93fffa14f00000"
             value="">
      <div class="input-hint">格式：UID Token（用空格分隔）</div>
      <div class="success-msg" id="connectionSuccess"></div>
      <div class="error-msg" id="connectionError"></div>
    </div>
    <div class="config-group" style="margin-top: 20px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1);">
      <button id="connectBtn" class="btn" style="width: 100%; padding: 12px; font-size: 1.1rem;">
        ✅ 验证并进入游戏设置
      </button>
    </div>
  </div>

  <!-- 第2步：游戏设置面板（初始隐藏） -->
  <div class="config-panel" id="panelConfig" style="display: none;">
    <div class="config-group">
      <div class="config-title">⚙️ 步骤2：游戏设置</div>
      <div style="color: #cbd5e0; font-size: 0.9rem; margin-bottom: 12px;">
        棋盘大小：9 × 9
      </div>
    </div>
    
    <div class="config-group">
      <div class="config-title">💣 雷数设置 (10-33)</div>
      <div class="mines-input-group">
        <input type="range" id="minesSlider" class="mines-slider" min="10" max="33" value="10">
      </div>
      <div class="mines-input-group">
        <input type="number" id="minesInput" class="mines-input" min="10" max="33" value="10">
        <span class="mines-value-display">个雷</span>
      </div>
    </div>
    
    <div class="config-group">
      <div class="config-title">⏱️ 游戏时间 (1-60分钟)</div>
      <div class="time-input-group">
        <input type="number" id="timeInput" class="time-input" min="1" max="60" value="2" step="1">
        <span class="time-unit">分钟</span>
      </div>
    </div>
    
    <div class="error-msg" id="configError"></div>

    <div class="config-group" style="margin-top: 20px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1);">
      <button id="startGameBtn" class="btn" style="width: 100%; padding: 12px; font-size: 1.1rem;">
        🚀 开始游戏
      </button>
    </div>
    <div class="config-group" style="text-align: center;">
      <button id="backToConnectBtn" class="btn secondary" style="width: auto; padding: 8px 20px; font-size: 0.9rem;">
        ↩️ 返回修改连接
      </button>
    </div>
  </div>

  <!-- 第3步：游戏主面板（初始隐藏） -->
  <div class="game-panel" id="panelGame">
    <div class="info-bar">
      <div class="timer" id="timerDisplay">02:00</div>
      <div class="status-msg" id="statusMessage">准备开始</div>
      <div class="mine-counter" id="mineCountDisplay">010</div>
    </div>
    
    <div id="board" class="board"></div>
    
    <div class="control-buttons">
      <button id="restartBtn" class="btn secondary">🔄 重新开始</button>
      <button id="endGameBtn" class="btn danger">⏹️ 结束游戏</button>
    </div>
  </div>
  
  <div class="footer">👆 点击翻开 · 长按标记 🚩</div>
</div>

<script>
  (function() {
    // --- 游戏状态变量 ---
    let board = [];
    const rows = 9, cols = 9;
    let totalMines = 10;
    let gameActive = false;
    let gameWin = false;
    let gameLose = false;
    let firstClick = true;
    let flagCount = 0;
    let timerInterval = null;
    let timeLeftSeconds = 120;
    
    // --- HTTP API 配置 ---
    const VIBRATION_API_URL = 'https://api.yokonex.com/v1/vibrate';
    let deviceUID = '';
    let deviceToken = '';
    
    // --- DOM 元素 ---
    const panelConnect = document.getElementById('panelConnect');
    const panelConfig = document.getElementById('panelConfig');
    const panelGame = document.getElementById('panelGame');
    const boardEl = document.getElementById('board');
    const timerDisplay = document.getElementById('timerDisplay');
    const mineCountDisplay = document.getElementById('mineCountDisplay');
    const statusMsg = document.getElementById('statusMessage');
    const connectBtn = document.getElementById('connectBtn');
    const backToConnectBtn = document.getElementById('backToConnectBtn');
    const startGameBtn = document.getElementById('startGameBtn');
    const restartBtn = document.getElementById('restartBtn');
    const endGameBtn = document.getElementById('endGameBtn');
    const connectionCode = document.getElementById('connectionCode');
    const timeInput = document.getElementById('timeInput');
    const minesInput = document.getElementById('minesInput');
    const minesSlider = document.getElementById('minesSlider');
    const configError = document.getElementById('configError');
    const connectionError = document.getElementById('connectionError');
    const connectionSuccess = document.getElementById('connectionSuccess');

    // --- 面板切换函数 ---
    function switchToPanel(panelName) {
      panelConnect.style.display = 'none';
      panelConfig.style.display = 'none';
      panelGame.style.display = 'none';

      if (panelName === 'connect') {
        panelConnect.style.display = 'block';
      } else if (panelName === 'config') {
        panelConfig.style.display = 'block';
      } else if (panelName === 'game') {
        panelGame.style.display = 'block';
        // 切换后确保棋盘滚动到可视区域
        setTimeout(() => { panelGame.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
      }
    }

    // --- 解析连接码 ---
    function parseConnectionCode() {
      const code = connectionCode.value.trim();
      
      connectionError.textContent = '';
      connectionSuccess.textContent = '';
      
      if (!code) {
        connectionError.textContent = '请输入连接码';
        return false;
      }
      
      const match = code.match(/^(\d+)\s+(\S+)$/);
      
      if (!match) {
        connectionError.textContent = '连接码格式错误，应为：UID Token（用空格分隔）';
        return false;
      }
      
      deviceUID = match[1];
      deviceToken = match[2];
      
      connectionSuccess.textContent = `连接信息已识别：UID=${deviceUID}`;
      return true;
    }

    // --- 同步雷数输入框和滑块 ---
    function updateMinesDisplay() {
      minesInput.value = totalMines;
      minesSlider.value = totalMines;
      mineCountDisplay.textContent = totalMines.toString().padStart(3, '0');
    }

    // --- 雷数输入框事件 ---
    minesInput.addEventListener('input', () => {
      let value = parseInt(minesInput.value);
      if (isNaN(value)) value = 10;
      if (value < 10) value = 10;
      if (value > 33) value = 33;
      totalMines = value;
      updateMinesDisplay();
    });

    minesInput.addEventListener('change', () => {
      let value = parseInt(minesInput.value);
      if (isNaN(value)) value = 10;
      if (value < 10) value = 10;
      if (value > 33) value = 33;
      totalMines = value;
      updateMinesDisplay();
    });

    // --- 雷数滑块事件 ---
    minesSlider.addEventListener('input', () => {
      totalMines = parseInt(minesSlider.value);
      updateMinesDisplay();
    });

    // --- 验证设置（仅验证连接码） ---
    function validateConnection() {
      configError.textContent = '';
      connectionError.textContent = '';
      connectionSuccess.textContent = '';
      
      if (!parseConnectionCode()) {
        return false;
      }
      return true;
    }

    // --- 验证设置（验证所有游戏参数） ---
    function validateGameConfig() {
      configError.textContent = '';
      
      let isValid = true;
      
      if (totalMines < 10 || totalMines > 33) {
        configError.textContent = '雷数必须在10-33之间';
        isValid = false;
      }
      
      const time = parseInt(timeInput.value);
      if (isNaN(time) || time < 1 || time > 60) {
        configError.textContent = '请设置1-60分钟的合理时间';
        isValid = false;
      }
      
      return isValid;
    }

    // --- 发送振动惩罚 ---
    async function triggerVibrationPunishment() {
      if (!deviceUID || !deviceToken) {
        console.warn('未设置设备连接信息');
        return;
      }
      
      const intensity = Math.min(100, Math.max(30, Math.round(30 + (totalMines - 10) * 3)));
      const duration = Math.min(3000, Math.max(1000, Math.round(1000 + (totalMines - 10) * 100)));
      
      const vibrationData = {
        uid: deviceUID,
        token: deviceToken,
        intensity: intensity,
        duration: duration,
        pattern: [200, 100],
        mines: totalMines,
        timestamp: Date.now()
      };
      
      console.log('发送振动指令:', vibrationData);
      
      try {
        const response = await fetch(VIBRATION_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(vibrationData)
        });
        
        if (!response.ok) {
          console.warn('振动API请求失败:', response.status);
          if (navigator.vibrate && vibrationData.pattern) {
            navigator.vibrate(vibrationData.pattern);
          }
        } else {
          const data = await response.json();
          console.log('振动指令发送成功:', data);
        }
      } catch (error) {
        console.error('发送振动指令时出错:', error);
        if (navigator.vibrate && vibrationData.pattern) {
          navigator.vibrate(vibrationData.pattern);
        }
      }
    }

    // --- 游戏功能函数 ---
    function formatTime(seconds) {
      if (seconds < 0) seconds = 0;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function updateGameMineCounter() {
      let remaining = totalMines - flagCount;
      mineCountDisplay.textContent = remaining.toString().padStart(3, '0');
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function startTimer() {
      if (timerInterval) stopTimer();
      if (!gameActive || gameWin || gameLose) return;

      timerInterval = setInterval(() => {
        if (!gameActive || gameWin || gameLose) {
          if (gameWin || gameLose) stopTimer();
          return;
        }
        timeLeftSeconds -= 1;
        timerDisplay.textContent = formatTime(timeLeftSeconds);

        if (timeLeftSeconds <= 0) {
          timeLeftSeconds = 0;
          timerDisplay.textContent = formatTime(0);
          gameLose = true;
          gameActive = false;
          statusMsg.textContent = '💥 时间到！';
          revealAllMines();
          stopTimer();
          triggerVibrationPunishment();
        }
      }, 1000);
    }

    function generateRandomBoard(r, c, mineCount) {
      const newBoard = [];
      for (let i = 0; i < r; i++) {
        const row = [];
        for (let j = 0; j < c; j++) {
          row.push({ mine: false, revealed: false, flagged: false, neighborMines: 0 });
        }
        newBoard.push(row);
      }
      let minesPlaced = 0;
      while (minesPlaced < mineCount) {
        const row = Math.floor(Math.random() * r);
        const col = Math.floor(Math.random() * c);
        if (!newBoard[row][col].mine) {
          newBoard[row][col].mine = true;
          minesPlaced++;
        }
      }
      for (let i = 0; i < r; i++) {
        for (let j = 0; j < c; j++) {
          if (newBoard[i][j].mine) continue;
          let cnt = 0;
          for (let di = -1; di <= 1; di++) {
            for (let dj = -1; dj <= 1; dj++) {
              if (di === 0 && dj === 0) continue;
              const ni = i + di, nj = j + dj;
              if (ni >= 0 && ni < r && nj >= 0 && nj < c && newBoard[ni][nj].mine) cnt++;
            }
          }
          newBoard[i][j].neighborMines = cnt;
        }
      }
      return newBoard;
    }

    function regenerateBoardExcluding(clickRow, clickCol) {
      let newBoard;
      let valid = false;
      while (!valid) {
        newBoard = generateRandomBoard(rows, cols, totalMines);
        if (!newBoard[clickRow][clickCol].mine) valid = true;
      }
      return newBoard;
    }

    function renderBoard() {
      boardEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      boardEl.innerHTML = '';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = board[r][c];
          const cellDiv = document.createElement('div');
          cellDiv.className = 'cell';
          cellDiv.dataset.row = r;
          cellDiv.dataset.col = c;

          if (cell.revealed) {
            cellDiv.classList.add('revealed');
            if (cell.mine) {
              cellDiv.classList.add('mine');
              cellDiv.textContent = '';
            } else {
              const cnt = cell.neighborMines;
              cellDiv.textContent = cnt === 0 ? '' : cnt;
              if (cnt > 0) cellDiv.classList.add(`num${cnt}`);
            }
          } else {
            cellDiv.classList.add('covered');
            if (cell.flagged) {
              cellDiv.classList.add('flagged');
            } else {
              cellDiv.textContent = '';
            }
          }
          boardEl.appendChild(cellDiv);
        }
      }
    }

    function revealAllMines() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (board[r][c].mine && !board[r][c].revealed) {
            board[r][c].revealed = true;
          }
        }
      }
      renderBoard();
    }

    function checkWin() {
      let revealedCount = 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (board[r][c].revealed) revealedCount++;
        }
      }
      if (revealedCount === rows * cols - totalMines) {
        gameWin = true;
        gameActive = false;
        statusMsg.textContent = '🎉 胜利！';
        stopTimer();
        return true;
      }
      return false;
    }

    function openCell(row, col) {
      if (!gameActive || gameWin || gameLose) return;
      if (row < 0 || row >= rows || col < 0 || col >= cols) return;
      const cell = board[row][col];
      if (cell.revealed) return;
      if (cell.flagged) return;

      if (firstClick) {
        if (cell.mine) {
          board = regenerateBoardExcluding(row, col);
          flagCount = 0;
          firstClick = false;
          gameActive = true;
          openCell(row, col);
          renderBoard();
          updateGameMineCounter();
          return;
        } else {
          firstClick = false;
        }
      }

      if (cell.mine) {
        cell.revealed = true;
        gameActive = false;
        gameLose = true;
        statusMsg.textContent = '💣 踩雷了！';
        revealAllMines();
        stopTimer();
        renderBoard();
        triggerVibrationPunishment();
        return;
      }

      const queue = [{r: row, c: col}];
      while (queue.length) {
        const {r, c} = queue.shift();
        const current = board[r][c];
        if (current.revealed || current.flagged) continue;
        if (current.mine) continue;

        current.revealed = true;
        if (current.neighborMines === 0) {
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && 
                  !board[nr][nc].revealed && !board[nr][nc].flagged && !board[nr][nc].mine) {
                queue.push({r: nr, c: nc});
              }
            }
          }
        }
      }

      renderBoard();
      if (checkWin()) {
        gameActive = false;
        stopTimer();
      }
    }

    function toggleFlag(row, col) {
      if (!gameActive || gameWin || gameLose) return;
      if (firstClick) return;
      const cell = board[row][col];
      if (cell.revealed) return;

      if (!cell.flagged) {
        cell.flagged = true;
        flagCount++;
      } else {
        cell.flagged = false;
        flagCount--;
      }
      updateGameMineCounter();
      renderBoard();
      checkWin();
    }

    function resetGame() {
      board = generateRandomBoard(rows, cols, totalMines);
      firstClick = true;
      gameActive = true;
      gameWin = false;
      gameLose = false;
      flagCount = 0;
      
      const minutes = parseInt(timeInput.value) || 2;
      timeLeftSeconds = minutes * 60;
      timerDisplay.textContent = formatTime(timeLeftSeconds);
      
      updateGameMineCounter();
      statusMsg.textContent = '游戏进行中';
      renderBoard();
      
      stopTimer();
      startTimer();
    }

    // --- 事件监听 ---
    connectBtn.addEventListener('click', () => {
      if (validateConnection()) {
        switchToPanel('config');
      }
    });

    backToConnectBtn.addEventListener('click', () => {
      switchToPanel('connect');
    });

    startGameBtn.addEventListener('click', () => {
      if (validateGameConfig()) {
        switchToPanel('game');
        resetGame();
      }
    });

    restartBtn.addEventListener('click', () => {
      if (validateGameConfig()) {
        resetGame();
      }
    });

    endGameBtn.addEventListener('click', () => {
      if (gameActive) {
        stopTimer();
        gameActive = false;
        gameLose = true;
        gameWin = false;
        statusMsg.textContent = '游戏结束';
        revealAllMines();
        triggerVibrationPunishment();
        // 关键修改：结束游戏后返回设置界面
        setTimeout(() => switchToPanel('config'), 800);
      } else {
        // 如果游戏已结束，直接返回设置界面
        switchToPanel('config');
      }
    });

    boardEl.addEventListener('click', (e) => {
      const cellDiv = e.target.closest('.cell');
      if (!cellDiv) return;
      const row = parseInt(cellDiv.dataset.row);
      const col = parseInt(cellDiv.dataset.col);
      if (isNaN(row) || isNaN(col)) return;
      openCell(row, col);
    });

    boardEl.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const cellDiv = e.target.closest('.cell');
      if (!cellDiv) return;
      const row = parseInt(cellDiv.dataset.row);
      const col = parseInt(cellDiv.dataset.col);
      if (isNaN(row) || isNaN(col)) return;
      toggleFlag(row, col);
    });

    // 初始化
    updateMinesDisplay();
    switchToPanel('connect'); // 默认显示连接面板
  })();
</script>
</body>
</html>
