<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>⏳ 限时扫雷 · 开始/结束控制</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #3b3f45;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
    }
    .game-container {
      max-width: 600px;
      width: 100%;
      background: #4a4f5a;
      border-radius: 32px 32px 28px 28px;
      box-shadow: 0 12px 25px rgba(0,0,0,0.5);
      padding: 20px 16px 24px;
      border: 2px solid #6d7482;
    }
    h1 {
      text-align: center;
      margin: 0 0 12px 0;
      font-size: 1.9rem;
      font-weight: 500;
      letter-spacing: 2px;
      color: #f5e7d3;
      text-shadow: 2px 2px 0 #2f3540;
    }
    .panel {
      background: #616774;
      border-radius: 30px;
      padding: 16px 12px;
      margin-bottom: 18px;
      box-shadow: inset 0 2px 5px #2f3540, 0 4px 0 #2f3540;
    }
    .difficulty-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
      justify-content: center;
    }
    .custom-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      background: #505562;
      padding: 12px 10px;
      border-radius: 40px;
      margin-bottom: 10px;
    }
    .badge {
      color: #ffdba0;
      font-weight: 600;
      font-size: 0.9rem;
      margin-right: 4px;
    }
    .input-number {
      width: 70px;
      background: #2f3540;
      border: none;
      border-radius: 30px;
      padding: 10px 8px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      text-align: center;
      border: 2px solid #7f889a;
    }
    .input-number:focus {
      outline: 2px solid #f5b37c;
    }
    .input-slider-container {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #505562;
      padding: 12px 10px;
      border-radius: 40px;
      margin-bottom: 10px;
    }
    .slider-label {
      color: #ffdba0;
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .slider-value {
      color: #ffffff;
      font-weight: 600;
      font-size: 1rem;
      min-width: 30px;
      text-align: center;
    }
    .slider {
      flex: 1;
      -webkit-appearance: none;
      height: 8px;
      background: #2f3540;
      border-radius: 4px;
      outline: none;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: #f5b37c;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #ffe1b3;
    }
    .slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: #f5b37c;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #ffe1b3;
    }
    button {
      background: #f5b37c;
      border: none;
      border-radius: 40px;
      padding: 10px 18px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #1e2229;
      box-shadow: 0 4px 0 #9f6e4b, 0 2px 8px rgba(0,0,0,0.3);
      transition: 0.05s linear;
      cursor: pointer;
      touch-action: manipulation;
      border: 1px solid #ffe1b3;
      min-width: 64px;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 #9f6e4b, 0 2px 6px rgba(0,0,0,0.3);
    }
    .time-preset {
      background: #b0c2d9;
      box-shadow: 0 4px 0 #6f7c91;
    }
    .time-preset:active { transform: translateY(4px); box-shadow: none; }
    .start-btn {
      background: #80c0a0;
      box-shadow: 0 4px 0 #4f735b;
      font-size: 1.3rem;
      padding: 12px 25px;
      flex: 1 0 auto;
    }
    .end-btn {
      background: #c57c7c;
      box-shadow: 0 4px 0 #7a4f4f;
    }
    .info-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #2f3540;
      border-radius: 50px;
      padding: 12px 18px;
      margin-bottom: 20px;
      color: #f0e9dd;
      font-weight: bold;
      font-size: 1.3rem;
      border: 2px solid #6d7a8c;
    }
    .timer, .mine-counter {
      background: #0f1217;
      padding: 6px 20px;
      border-radius: 40px;
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
      border: 2px solid #7f8c9f;
      color: #fdd68b;
      font-size: 1.4rem;
    }
    .status-msg {
      background: #424857;
      border-radius: 30px;
      padding: 5px 15px;
      font-size: 1.2rem;
    }
    .board {
      display: grid;
      gap: 3px;
      background: #787f8f;
      padding: 14px;
      border-radius: 30px;
      border: 4px solid #5a6070;
      box-shadow: inset 0 0 0 2px #353b45;
      margin-top: 8px;
      touch-action: pan-y pinch-zoom;
    }
    .cell {
      aspect-ratio: 1 / 1;
      background: #a7b0bd;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.4rem;
      box-shadow: inset 0 -2px 0 #5b6475, inset 0 2px 5px #dbe1ed;
      transition: 0.05s;
      color: #1b2a41;
      cursor: pointer;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
    .cell.covered {
      background: #9aa3b5;
      box-shadow: inset 0 -4px 0 #616b7e, inset 0 1px 5px #eef3fc;
    }
    .cell.covered:active {
      background: #7d879b;
      transform: scale(0.98);
    }
    .cell.revealed {
      background: #cfd6e6;
      box-shadow: inset 0 0 0 1px #abb4c7;
    }
    .cell.flagged::before {
      content: "🚩";
      font-size: 1.6rem;
      line-height: 1;
    }
    .cell.revealed.mine {
      background: #c55a5a;
      color: black;
    }
    .cell.revealed.mine::before {
      content: "💣";
    }
    .cell.revealed:not(.mine):not(.flagged) {
      color: #1d3e6b;
    }
    .num1 { color: #0202c2; }
    .num2 { color: #1f7a1f; }
    .num3 { color: #c10101; }
    .num4 { color: #0d0d72; }
    .num5 { color: #7b0f4b; }
    .num6 { color: #2b6c7c; }
    .num7 { color: #1e1e1e; }
    .num8 { color: #5e3f0b; }
    .footer {
      text-align: center;
      color: #bac3d0;
      margin-top: 15px;
      font-size: 0.9rem;
    }
    .flex-fill {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }
    .label-min {
      color: #ffddb0;
      font-weight: 500;
      margin-left: 5px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>💣 扫雷 · 倒计时</h1>

  <!-- 难度预设 + 自定义行列雷 -->
  <div class="panel">
    <div class="difficulty-row">
      <button id="easyPreset">🌱 初级<br><small>8x8 / 10雷</small></button>
      <button id="mediumPreset">🍂 中级<br><small>16x16 / 40雷</small></button>
      <button id="hardPreset">🗻 高级<br><small>22x22 / 99雷</small></button>
    </div>
    <div class="custom-row">
      <span class="badge">📐自定义</span>
      <input id="rows" class="input-number" type="number" min="2" max="24" value="8" step="1">
      <span style="color:white;">✖️</span>
      <input id="cols" class="input-number" type="number" min="2" max="30" value="8" step="1">
      <span class="badge" style="margin-left:5px;">💣雷数</span>
      <input id="mines" class="input-number" type="number" min="1" max="500" value="10" step="1">
    </div>
    
    <!-- 新增：惩罚力度设置 -->
    <div class="input-slider-container">
      <span class="slider-label">🔧 惩罚力度</span>
      <input type="range" id="punishmentSlider" class="slider" min="1" max="10" value="5">
      <input id="punishmentInput" class="input-number" type="number" min="1" max="10" value="5" step="1" style="width: 60px;">
      <span class="slider-value" id="punishmentValue">5</span>
    </div>
  </div>

  <!-- 时间预设 + 自定义时间 + 开始/结束按钮 -->
  <div class="panel" style="padding: 12px;">
    <div class="flex-fill" style="margin-bottom: 10px;">
      <button class="time-preset" data-min="1">⏱️ 1'</button>
      <button class="time-preset" data-min="3">⏱️ 3'</button>
      <button class="time-preset" data-min="5">⏱️ 5'</button>
      <button class="time-preset" data-min="10">⏱️ 10'</button>
      <div style="display: flex; align-items: center; background:#404654; border-radius:40px; padding:2px 10px;">
        <input id="customMinutes" class="input-number" type="number" min="0.1" max="120" value="1" step="0.1" style="width:85px;">
        <span class="label-min">分钟</span>
      </div>
    </div>
    <div style="display: flex; gap: 12px;">
      <button id="newGameBtn" class="start-btn">🚀 开始游戏</button>
      <button id="endGameBtn" class="start-btn end-btn">⏹️ 结束游戏</button>
    </div>
  </div>

  <!-- 信息栏：计时 / 剩余雷数 / 状态 -->
  <div class="info-bar">
    <div class="timer" id="timerDisplay">01:00</div>
    <div class="status-msg" id="statusMessage">⏸️ 待开始</div>
    <div class="mine-counter" id="mineCountDisplay">010</div>
  </div>

  <!-- 游戏板 -->
  <div id="board" class="board" style="justify-content: center;"></div>
  <div class="footer">👆 单击翻开 · 长按/右键 🚩 插旗</div>
</div>

<script>
  (function() {
    // --- DOM 元素 ---
    const boardEl = document.getElementById('board');
    const rowsInput = document.getElementById('rows');
    const colsInput = document.getElementById('cols');
    const minesInput = document.getElementById('mines');
    const customMinutes = document.getElementById('customMinutes');
    const timerDisplay = document.getElementById('timerDisplay');
    const mineCountDisplay = document.getElementById('mineCountDisplay');
    const statusMsg = document.getElementById('statusMessage');
    const newGameBtn = document.getElementById('newGameBtn');
    const endGameBtn = document.getElementById('endGameBtn');
    
    // 新增：惩罚设置相关元素
    const punishmentSlider = document.getElementById('punishmentSlider');
    const punishmentInput = document.getElementById('punishmentInput');
    const punishmentValue = document.getElementById('punishmentValue');

    // --- HTTP API 配置 ---
    const VIBRATION_API_URL = 'https://api.your-vibration-device.com/v1/vibrate'; // 请替换为实际API端点
    const API_KEY = 'your-api-key-here'; // 请替换为您的API密钥
    
    // 振动参数映射
    const VIBRATION_PRESETS = {
      easy: { intensity: 30, duration: 1000, pattern: [200, 100] },    // 初级：强度30，持续1秒
      medium: { intensity: 60, duration: 2000, pattern: [200, 100, 200, 100] }, // 中级：强度60，持续2秒
      hard: { intensity: 100, duration: 3000, pattern: [300, 100, 300, 100, 300, 100] } // 高级：强度100，持续3秒
    };

    // --- 游戏状态变量 ---
    let board = [];
    let rows = 8, cols = 8, totalMines = 10;
    let gameActive = false;         // true 表示可以进行操作
    let gameWin = false;
    let gameLose = false;
    let firstClick = true;          // 首次点击标记
    let flagCount = 0;
    let timerInterval = null;
    let timeLeftSeconds = 60;
    let initialTimeSeconds = 60;
    let currentDifficulty = 'easy'; // 当前难度：easy/medium/hard
    let punishmentLevel = 5;        // 惩罚力度：1-10

    // --- 更新惩罚力度显示 ---
    function updatePunishmentDisplay() {
      punishmentValue.textContent = punishmentLevel;
      punishmentInput.value = punishmentLevel;
      punishmentSlider.value = punishmentLevel;
    }

    // --- 发送振动惩罚 ---
    async function triggerVibrationPunishment() {
      // 获取当前难度对应的基础振动参数
      const basePreset = VIBRATION_PRESETS[currentDifficulty];
      if (!basePreset) return;
      
      // 计算最终的惩罚力度（基础参数 * 用户自定义系数）
      const userMultiplier = punishmentLevel / 5; // 5是中间值，力度系数 = 用户设置/5
      const finalIntensity = Math.min(100, Math.max(10, Math.round(basePreset.intensity * userMultiplier)));
      const finalDuration = Math.min(5000, Math.max(500, Math.round(basePreset.duration * userMultiplier)));
      
      // 构建振动数据
      const vibrationData = {
        intensity: finalIntensity,  // 振动强度 0-100
        duration: finalDuration,    // 总持续时间（毫秒）
        pattern: basePreset.pattern, // 振动模式
        level: punishmentLevel,     // 用户设置的惩罚级别
        difficulty: currentDifficulty // 当前游戏难度
      };
      
      console.log('触发振动惩罚:', vibrationData);
      
      try {
        // 发送HTTP POST请求到振动设备API
        const response = await fetch(VIBRATION_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify(vibrationData)
        });
        
        if (!response.ok) {
          console.warn('振动API请求失败:', response.status);
          // 如果实际API不可用，可以使用浏览器振动API作为后备（如果浏览器支持）
          if (navigator.vibrate) {
            const pattern = basePreset.pattern.map(t => t * userMultiplier);
            navigator.vibrate(pattern);
          }
        } else {
          console.log('振动惩罚已发送');
        }
      } catch (error) {
        console.error('发送振动惩罚时出错:', error);
        // 错误处理：尝试使用浏览器振动API
        if (navigator.vibrate) {
          const pattern = basePreset.pattern.map(t => t * userMultiplier);
          navigator.vibrate(pattern);
        }
      }
    }

    // --- 辅助函数：格式化 mm:ss ---
    function formatTime(seconds) {
      if (seconds < 0) seconds = 0;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // --- 更新剩余雷数显示 ---
    function updateMineCounter() {
      let remaining = totalMines - flagCount;
      mineCountDisplay.textContent = remaining.toString().padStart(3, '0');
    }

    // --- 停止计时器 ---
    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    // --- 开始倒计时 ---
    function startTimer() {
      if (timerInterval) stopTimer();
      if (!gameActive || gameWin || gameLose) return;

      timerInterval = setInterval(() => {
        if (!gameActive || gameWin || gameLose) {
          if (gameWin || gameLose) stopTimer();
          return;
        }
        timeLeftSeconds -= 1;
        timerDisplay.textContent = formatTime(timeLeftSeconds);

        if (timeLeftSeconds <= 0) {
          timeLeftSeconds = 0;
          timerDisplay.textContent = formatTime(0);
          gameLose = true;
          gameActive = false;
          statusMsg.innerText = '💥 时间到...';
          revealAllMines();
          stopTimer();
          // 时间到触发惩罚
          triggerVibrationPunishment();
        }
      }, 1000);
    }

    // --- 从输入重置时间显示 (不启动) ---
    function resetTimeFromInput() {
      let mins = parseFloat(customMinutes.value);
      if (isNaN(mins) || mins <= 0) mins = 1;
      if (mins > 120) mins = 120;
      initialTimeSeconds = Math.floor(mins * 60);
      timeLeftSeconds = initialTimeSeconds;
      timerDisplay.textContent = formatTime(timeLeftSeconds);
    }

    // --- 生成随机棋盘 (不保证首次点击安全) ---
    function generateRandomBoard(r, c, mineCount) {
      const newBoard = [];
      for (let i = 0; i < r; i++) {
        const row = [];
        for (let j = 0; j < c; j++) {
          row.push({ mine: false, revealed: false, flagged: false, neighborMines: 0 });
        }
        newBoard.push(row);
      }
      let minesPlaced = 0;
      while (minesPlaced < mineCount) {
        const row = Math.floor(Math.random() * r);
        const col = Math.floor(Math.random() * c);
        if (!newBoard[row][col].mine) {
          newBoard[row][col].mine = true;
          minesPlaced++;
        }
      }
      for (let i = 0; i < r; i++) {
        for (let j = 0; j < c; j++) {
          if (newBoard[i][j].mine) continue;
          let cnt = 0;
          for (let di = -1; di <= 1; di++) {
            for (let dj = -1; dj <= 1; dj++) {
              if (di === 0 && dj === 0) continue;
              const ni = i + di, nj = j + dj;
              if (ni >= 0 && ni < r && nj >= 0 && nj < c && newBoard[ni][nj].mine) cnt++;
            }
          }
          newBoard[i][j].neighborMines = cnt;
        }
      }
      return newBoard;
    }

    // --- 重新生成避开首次点击 ---
    function regenerateBoardExcluding(clickRow, clickCol) {
      let newBoard;
      let valid = false;
      while (!valid) {
        newBoard = generateRandomBoard(rows, cols, totalMines);
        if (!newBoard[clickRow][clickCol].mine) valid = true;
      }
      return newBoard;
    }

    // --- 渲染网格 ---
    function renderBoard() {
      boardEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      boardEl.innerHTML = '';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = board[r][c];
          const cellDiv = document.createElement('div');
          cellDiv.className = 'cell';
          cellDiv.dataset.row = r;
          cellDiv.dataset.col = c;

          if (cell.revealed) {
            cellDiv.classList.add('revealed');
            if (cell.mine) {
              cellDiv.classList.add('mine');
              cellDiv.innerText = '';
            } else {
              const cnt = cell.neighborMines;
              cellDiv.innerText = cnt === 0 ? '' : cnt;
              if (cnt > 0) cellDiv.classList.add(`num${cnt}`);
            }
          } else {
            cellDiv.classList.add('covered');
            if (cell.flagged) {
              cellDiv.classList.add('flagged');
            } else {
              cellDiv.innerText = '';
            }
          }
          boardEl.appendChild(cellDiv);
        }
      }
    }

    // --- 翻开所有雷 (游戏失败时) ---
    function revealAllMines() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (board[r][c].mine && !board[r][c].revealed) {
            board[r][c].revealed = true;
          }
        }
      }
      renderBoard();
    }

    // --- 检查胜利 ---
    function checkWin() {
      let revealedCount = 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (board[r][c].revealed) revealedCount++;
        }
      }
      if (revealedCount === rows * cols - totalMines) {
        gameWin = true;
        gameActive = false;
        statusMsg.innerText = '🎉 胜利 !';
        stopTimer();
        return true;
      }
      return false;
    }

    // --- 翻开格子 ---
    function openCell(row, col) {
      if (!gameActive || gameWin || gameLose) return;
      if (row < 0 || row >= rows || col < 0 || col >= cols) return;
      const cell = board[row][col];
      if (cell.revealed) return;
      if (cell.flagged) return;

      if (firstClick) {
        if (cell.mine) {
          board = regenerateBoardExcluding(row, col);
          flagCount = 0;
          firstClick = false;
          gameActive = true;
          openCell(row, col);
          renderBoard();
          updateMineCounter();
          return;
        } else {
          firstClick = false;
        }
      }

      if (cell.mine) {
        cell.revealed = true;
        gameActive = false;
        gameLose = true;
        statusMsg.innerText = '💣 踩雷了...';
        revealAllMines();
        stopTimer();
        renderBoard();
        // 踩雷触发惩罚
        triggerVibrationPunishment();
        return;
      }

      const queue = [{r: row, c: col}];
      while (queue.length) {
        const {r, c} = queue.shift();
        const current = board[r][c];
        if (current.revealed || current.flagged) continue;
        if (current.mine) continue;

        current.revealed = true;
        if (current.neighborMines === 0) {
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !board[nr][nc].revealed && !board[nr][nc].flagged && !board[nr][nc].mine) {
                queue.push({r: nr, c: nc});
              }
            }
          }
        }
      }

      renderBoard();
      if (checkWin()) {
        gameActive = false;
        stopTimer();
      }
    }

    // --- 切换旗子 ---
    function toggleFlag(row, col) {
      if (!gameActive || gameWin || gameLose) return;
      if (firstClick) return;
      const cell = board[row][col];
      if (cell.revealed) return;

      if (!cell.flagged) {
        cell.flagged = true;
        flagCount++;
      } else {
        cell.flagged = false;
        flagCount--;
      }
      updateMineCounter();
      renderBoard();
      checkWin();
    }

    // --- 重置棋盘 (根据active决定是否立即开始) ---
    function resetBoard(active) {
      // 读取参数并限制
      let r = parseInt(rowsInput.value);
      let c = parseInt(colsInput.value);
      let m = parseInt(minesInput.value);
      r = Math.min(30, Math.max(2, isNaN(r) ? 8 : r));
      c = Math.min(30, Math.max(2, isNaN(c) ? 8 : c));
      const maxMines = r * c - 1;
      m = Math.min(maxMines, Math.max(1, isNaN(m) ? 10 : m));
      rows = r; cols = c; totalMines = m;
      rowsInput.value = rows; colsInput.value = cols; minesInput.value = totalMines;
      
      // 根据棋盘大小确定难度
      if (rows === 8 && cols === 8 && totalMines === 10) {
        currentDifficulty = 'easy';
      } else if (rows === 16 && cols === 16 && totalMines === 40) {
        currentDifficulty = 'medium';
      } else if (rows === 22 && cols === 22 && totalMines === 99) {
        currentDifficulty = 'hard';
      } else {
        // 自定义棋盘使用中级难度
        currentDifficulty = 'medium';
      }

      // 重置时间显示
      resetTimeFromInput();

      // 停止旧计时
      stopTimer();

      // 生成新棋盘
      board = generateRandomBoard(rows, cols, totalMines);
      firstClick = true;
      gameActive = active;
      gameWin = false;
      gameLose = false;
      flagCount = 0;
      updateMineCounter();
      statusMsg.innerText = active ? '💪 进行中' : '⏸️ 待开始';
      renderBoard();

      if (active) {
        startTimer();
      }
    }

    // --- 事件监听 ---
    function handleBoardClick(e) {
      const cellDiv = e.target.closest('.cell');
      if (!cellDiv) return;
      const row = parseInt(cellDiv.dataset.row);
      const col = parseInt(cellDiv.dataset.col);
      if (isNaN(row) || isNaN(col)) return;
      openCell(row, col);
    }

    function handleBoardContextMenu(e) {
      e.preventDefault();
      const cellDiv = e.target.closest('.cell');
      if (!cellDiv) return;
      const row = parseInt(cellDiv.dataset.row);
      const col = parseInt(cellDiv.dataset.col);
      if (isNaN(row) || isNaN(col)) return;
      toggleFlag(row, col);
    }

    // 难度预设
    document.getElementById('easyPreset').addEventListener('click', () => {
      rowsInput.value = 8; colsInput.value = 8; minesInput.value = 10;
      currentDifficulty = 'easy';
    });
    document.getElementById('mediumPreset').addEventListener('click', () => {
      rowsInput.value = 16; colsInput.value = 16; minesInput.value = 40;
      currentDifficulty = 'medium';
    });
    document.getElementById('hardPreset').addEventListener('click', () => {
      rowsInput.value = 22; colsInput.value = 22; minesInput.value = 99;
      currentDifficulty = 'hard';
    });

    // 时间预设
    document.querySelectorAll('.time-preset').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const min = e.target.dataset.min;
        if (min) customMinutes.value = min;
      });
    });

    // 惩罚力度滑块事件
    punishmentSlider.addEventListener('input', (e) => {
      punishmentLevel = parseInt(e.target.value);
      updatePunishmentDisplay();
    });
    
    punishmentInput.addEventListener('input', (e) => {
      let value = parseInt(e.target.value);
      if (isNaN(value)) value = 5;
      if (value < 1) value = 1;
      if (value > 10) value = 10;
      punishmentLevel = value;
      updatePunishmentDisplay();
    });
    
    punishmentInput.addEventListener('change', (e) => {
      let value = parseInt(e.target.value);
      if (isNaN(value)) value = 5;
      if (value < 1) value = 1;
      if (value > 10) value = 10;
      punishmentLevel = value;
      updatePunishmentDisplay();
    });

    // 开始游戏
    newGameBtn.addEventListener('click', () => {
      resetBoard(true);
    });

    // 结束游戏：强制失败
    endGameBtn.addEventListener('click', () => {
      if (gameActive) {  // 只有正在进行中的游戏才能被结束
        stopTimer();
        gameActive = false;
        gameLose = true;
        gameWin = false;
        statusMsg.innerText = '💥 游戏结束';
        revealAllMines();  // 翻开所有雷
        // 手动结束游戏也触发惩罚
        triggerVibrationPunishment();
      }
    });

    // 绑定棋盘事件
    boardEl.addEventListener('click', handleBoardClick);
    boardEl.addEventListener('contextmenu', handleBoardContextMenu);

    // 防止面板长按菜单
    document.querySelectorAll('button, input').forEach(el => {
      el.addEventListener('contextmenu', (e) => e.preventDefault());
    });

    // 初始化：待开始状态，棋盘生成但不激活
    resetBoard(false);
    updatePunishmentDisplay(); // 初始化惩罚力度显示
  })();
</script>
</body>
</html>
